# CI: lint, test, build. Start MongoDB service for integration tests that need DB.
name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  server:
    runs-on: ubuntu-latest
    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval \"db.adminCommand('ping')\""
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: server/package-lock.json
      - name: Install server deps
        run: npm ci
        working-directory: server
      - name: Lint server (optional)
        run: npm run lint 2>/dev/null || true
        working-directory: server
      - name: Test server
        run: npm test
        working-directory: server
        env:
          MONGO_URI: mongodb://localhost:27017/PMS_test

  client:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: client/package-lock.json
      - name: Install client deps
        run: npm ci
        working-directory: client
      - name: Lint client
        run: npm run lint
        working-directory: client
      - name: Build client
        run: npm run build
        working-directory: client
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL || 'http://localhost:5000/api/v1' }}
